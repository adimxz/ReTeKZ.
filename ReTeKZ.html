<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReTeKZ OS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;600&family=Exo+2:wght@300;400;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;user-select:none}
  :root{--or:#ff6b00;--ac:#ff9f1c;--bg:#000;--c1:#0d0d0d;--c2:#141414;--b1:#1e1e1e;--b2:#2a2a2a;--tx:#e0e0e0;--mu:#555;--gr:#00ff88;--rd:#ff3333;--bl:#4488ff}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;color:var(--tx);font-family:'Exo 2',sans-serif;cursor:none}

  #cur{position:fixed;width:11px;height:11px;background:var(--or);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);box-shadow:0 0 7px var(--or),0 0 14px #ff6b0055;transition:width .1s,height .1s}
  #ctr{position:fixed;width:26px;height:26px;border:1px solid #ff6b0055;border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%)}
  #cur.ck{width:6px;height:6px;background:var(--ac)}

  #desk{width:100%;height:calc(100vh - 38px);position:relative;overflow:hidden;background:radial-gradient(ellipse at 15% 20%,#ff6b0009 0%,transparent 45%),radial-gradient(ellipse at 85% 80%,#ff9f1c07 0%,transparent 45%),#000}
  #desk::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,107,0,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,107,0,.025) 1px,transparent 1px);background-size:36px 36px;pointer-events:none}

  .di{position:absolute;width:62px;text-align:center;padding:5px 3px;border-radius:7px;cursor:none;transition:background .15s,transform .15s}
  .di:hover{background:rgba(255,107,0,.13);transform:scale(1.06)}
  .di .ico{font-size:1.8rem;display:block;filter:drop-shadow(0 2px 5px rgba(0,0,0,.9))}
  .di .lbl{font-size:.6rem;color:#ddd;text-shadow:0 1px 4px #000,0 0 8px #000;margin-top:2px;line-height:1.3}

  #tb{position:fixed;bottom:0;left:0;right:0;height:38px;background:rgba(4,4,4,.98);border-top:1px solid #181818;display:flex;align-items:center;padding:0 6px;gap:5px;z-index:10000}
  #sbtn{background:linear-gradient(135deg,#ff6b00,#ff9f1c);border:none;color:#000;font-family:'Rajdhani',sans-serif;font-size:.76rem;font-weight:700;letter-spacing:2px;padding:4px 11px;border-radius:5px;cursor:none;text-transform:uppercase;transition:opacity .15s,transform .1s;flex-shrink:0}
  #sbtn:hover{opacity:.85}
  #sbtn:active{transform:scale(.96)}
  .tsep{width:1px;height:21px;background:#1c1c1c;flex-shrink:0}
  #tapps{display:flex;gap:3px;flex:1;overflow:hidden}
  .tap{background:#0f0f0f;border:1px solid #1e1e1e;border-radius:4px;padding:2px 8px;font-size:.66rem;color:#888;cursor:none;white-space:nowrap;max-width:105px;overflow:hidden;text-overflow:ellipsis;transition:all .12s}
  .tap:hover{background:#1a1a1a;color:#bbb}
  .tap.act{background:#1a0a00;border-color:#ff6b0044;color:var(--ac)}
  #tclk{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:#666;text-align:right;line-height:1.5;flex-shrink:0;min-width:85px}

  #sm{position:fixed;bottom:42px;left:6px;width:210px;background:rgba(7,7,7,.98);border:1px solid #1e1e1e;border-radius:9px;padding:9px 7px;z-index:20000;display:none;box-shadow:0 -4px 24px rgba(0,0,0,.85),0 0 0 1px #ff6b0010}
  #sm.op{display:block;animation:smup .14s ease}
  @keyframes smup{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .sml{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(135deg,#ff6b00,#ff9f1c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;padding:2px 5px 7px}
  .sms{height:1px;background:#181818;margin:3px 0}
  .smi{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:5px;cursor:none;font-size:.75rem;color:#999;transition:all .12s}
  .smi:hover{background:rgba(255,107,0,.12);color:#fff}
  .smi .si{font-size:.95rem;width:16px;text-align:center}

  .win{position:absolute;background:var(--c1);border:1px solid #1e1e1e;border-radius:8px;box-shadow:0 10px 36px rgba(0,0,0,.9),0 0 0 1px #ff6b0007;display:flex;flex-direction:column;overflow:hidden;min-width:240px;min-height:150px}
  .wtb{background:#080808;border-bottom:1px solid #181818;padding:5px 9px;display:flex;align-items:center;gap:6px;cursor:move;flex-shrink:0}
  .wtit{font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:1px;color:#aaa;flex:1}
  .wb{width:10px;height:10px;border-radius:50%;border:none;cursor:none;flex-shrink:0;transition:filter .15s}
  .wb:hover{filter:brightness(1.4)}
  .wc{background:#ff3b30}.wm{background:#ffcc00}.wx{background:#28c840}
  .wbody{flex:1;overflow:auto;scrollbar-width:thin;scrollbar-color:#1a1a1a transparent}

  .tw{background:#000;height:100%;padding:9px;font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--gr);overflow-y:auto;scrollbar-width:thin;scrollbar-color:#111 transparent}
  .tl{line-height:1.6;word-break:break-all}
  .tl.pr{color:var(--or)}.tl.er{color:var(--rd)}.tl.in{color:var(--bl)}.tl.dm{color:#2a2a2a}
  .tir{display:flex;align-items:center;gap:4px;margin-top:1px}
  .tps{color:var(--or);white-space:nowrap;font-size:.7rem;font-family:'JetBrains Mono',monospace}
  .tin{background:none;border:none;color:var(--gr);font-family:'JetBrains Mono',monospace;font-size:.7rem;flex:1;outline:none;caret-color:var(--gr)}

  .fmtb{background:#080808;border-bottom:1px solid #181818;padding:5px 9px;font-size:.65rem;color:#444;display:flex;align-items:center;gap:5px}
  .fmp{color:var(--or);font-family:'JetBrains Mono',monospace;font-size:.65rem}
  .fmg{display:grid;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:3px;padding:7px}
  .fmi{text-align:center;padding:5px 2px;border-radius:5px;cursor:none;transition:background .12s}
  .fmi:hover{background:rgba(255,107,0,.1)}
  .fmi .fi{font-size:1.5rem;display:block}
  .fmi .fn{font-size:.58rem;color:#777;margin-top:2px;word-break:break-all;line-height:1.2}

  .npb{height:100%;display:flex;flex-direction:column}
  .nptb{background:#080808;border-bottom:1px solid #181818;padding:4px 7px;display:flex;gap:4px}
  .npbt{background:#111;border:1px solid #1e1e1e;color:#777;font-size:.62rem;padding:2px 7px;border-radius:3px;cursor:none;font-family:'Exo 2',sans-serif;transition:all .12s}
  .npbt:hover{background:#1a1a1a;color:#bbb}
  .npa{flex:1;background:#000;border:none;color:#ccc;font-family:'JetBrains Mono',monospace;font-size:.7rem;padding:9px;resize:none;outline:none;line-height:1.7;cursor:none}

  .mb{padding:9px;display:flex;flex-direction:column;gap:7px}
  .mt{font-size:.6rem;text-transform:uppercase;letter-spacing:2px;color:#3a3a3a;margin-bottom:2px}
  .bw{background:#080808;border-radius:3px;height:7px;overflow:hidden}
  .bf{height:100%;border-radius:3px;transition:width 1s}
  .bor{background:linear-gradient(90deg,#ff6b00,#ff9f1c)}
  .bbl{background:linear-gradient(90deg,#224,#4488ff)}
  .bgr{background:linear-gradient(90deg,#040,#00ff88)}
  .mv{font-family:'JetBrains Mono',monospace;font-size:.63rem;color:#555;text-align:right;margin-top:1px}
  .pl{margin-top:3px}
  .pr2{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #0d0d0d;font-size:.63rem;color:#555}
  .pr2 span:last-child{color:var(--or);font-family:'JetBrains Mono',monospace}

  .sb{padding:9px}
  .ss{margin-bottom:10px}
  .sst{font-size:.6rem;text-transform:uppercase;letter-spacing:2px;color:#333;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #141414}
  .sr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:.72rem;color:#999}
  .tog{width:28px;height:15px;background:#1a1a1a;border-radius:8px;position:relative;cursor:none;transition:background .2s;flex-shrink:0}
  .tog.on{background:var(--or)}
  .tog::after{content:'';position:absolute;width:9px;height:9px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s}
  .tog.on::after{left:16px}

  .aw{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:14px;text-align:center;gap:5px}
  .al{font-family:'Rajdhani',sans-serif;font-size:1.9rem;font-weight:700;letter-spacing:5px;background:linear-gradient(135deg,#ff6b00,#ff9f1c,#ffdd88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase}
  .as{font-size:.62rem;color:#333;letter-spacing:3px;text-transform:uppercase}
  .ad{width:36px;height:1px;background:linear-gradient(90deg,transparent,var(--or),transparent);margin:5px 0}
  .ai{font-size:.68rem;color:#444;line-height:1.9}
  .ai span{color:#666}

  @keyframes wo{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id="cur"></div>
<div id="ctr"></div>

<div id="desk">
  <div class="di" style="top:14px;left:12px" ondblclick="ow('terminal')"><span class="ico">🖥️</span><span class="lbl">Terminal</span></div>
  <div class="di" style="top:90px;left:12px" ondblclick="ow('files')"><span class="ico">📁</span><span class="lbl">Dosyalar</span></div>
  <div class="di" style="top:166px;left:12px" ondblclick="ow('notepad')"><span class="ico">📝</span><span class="lbl">Not</span></div>
  <div class="di" style="top:242px;left:12px" ondblclick="ow('sysmon')"><span class="ico">📊</span><span class="lbl">Sistem</span></div>
  <div class="di" style="top:318px;left:12px" ondblclick="ow('settings')"><span class="ico">⚙️</span><span class="lbl">Ayarlar</span></div>
  <div class="di" style="top:394px;left:12px" ondblclick="ow('about')"><span class="ico">🔥</span><span class="lbl">Hakkında</span></div>
</div>

<div id="tb">
  <button id="sbtn" onclick="tgSm()">ReTeKZ</button>
  <div class="tsep"></div>
  <div id="tapps"></div>
  <div class="tsep"></div>
  <div id="tclk"></div>
</div>

<div id="sm">
  <div class="sml">⚡ ReTeKZ</div>
  <div class="sms"></div>
  <div class="smi" onclick="ow('terminal');cSm()"><span class="si">🖥️</span> Terminal</div>
  <div class="smi" onclick="ow('files');cSm()"><span class="si">📁</span> Dosyalar</div>
  <div class="smi" onclick="ow('notepad');cSm()"><span class="si">📝</span> Not Defteri</div>
  <div class="smi" onclick="ow('sysmon');cSm()"><span class="si">📊</span> Sistem Monitörü</div>
  <div class="smi" onclick="ow('settings');cSm()"><span class="si">⚙️</span> Ayarlar</div>
  <div class="smi" onclick="ow('about');cSm()"><span class="si">🔥</span> ReTeKZ Hakkında</div>
  <div class="sms"></div>
  <div class="smi" onclick="location.reload()"><span class="si">🔄</span> Yeniden Başlat</div>
</div>

<script>
// CURSOR
const cur=document.getElementById('cur'),ctr=document.getElementById('ctr');
let mx=0,my=0,tx=0,ty=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  cur.style.left=mx+'px';cur.style.top=my+'px';
});
setInterval(()=>{tx+=(mx-tx)*.16;ty+=(my-ty)*.16;ctr.style.left=tx+'px';ctr.style.top=ty+'px';},14);
document.addEventListener('mousedown',()=>cur.classList.add('ck'));
document.addEventListener('mouseup',()=>cur.classList.remove('ck'));

// CLOCK
function uc(){
  const n=new Date();
  document.getElementById('tclk').innerHTML=
    n.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+'<br>'+
    n.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'2-digit'});
}
uc();setInterval(uc,1000);

// START
let sop=false;
function tgSm(){sop?cSm():oSm();}
function oSm(){sop=true;document.getElementById('sm').classList.add('op');}
function cSm(){sop=false;document.getElementById('sm').classList.remove('op');}
document.addEventListener('click',e=>{if(sop&&!e.target.closest('#sm')&&!e.target.closest('#sbtn'))cSm();});

// WINDOWS
let zT=100,ws={};
const D={
  terminal:{title:'🖥️ Terminal',w:360,h:230,x:90,y:35},
  files:{title:'📁 Dosyalar',w:320,h:210,x:140,y:55},
  notepad:{title:'📝 Not Defteri',w:300,h:210,x:160,y:45},
  sysmon:{title:'📊 Sistem',w:260,h:230,x:130,y:65},
  settings:{title:'⚙️ Ayarlar',w:250,h:230,x:110,y:45},
  about:{title:'🔥 ReTeKZ',w:230,h:210,x:190,y:55},
};

function bc(t){
  if(t==='terminal')return`<div class="tw" id="tw"><div class="tl dm">───────────────────</div><div class="tl in"> ReTeKZ Terminal v1.0</div><div class="tl dm">───────────────────</div><div class="tl" style="color:#333">help yazarak başla</div><div id="tls"></div><div class="tir"><span class="tps">root@retekz:~$</span><input class="tin" id="tin" onkeydown="tk(event)" autocomplete="off" spellcheck="false"></div></div>`;
  if(t==='files')return`<div class="fmtb"><span>📍</span><span class="fmp">/home/adem</span></div><div class="fmg">${[['📁','belgeler'],['📁','projeler'],['📁','indirmeler'],['🐍','main.py'],['📄','readme.txt'],['🔒','config.cfg'],['🖼️','ekran.png'],['📦','araçlar'],['⚙️','setup.sh'],['📊','data.csv']].map(([i,n])=>`<div class="fmi"><span class="fi">${i}</span><span class="fn">${n}</span></div>`).join('')}</div>`;
  if(t==='notepad')return`<div class="npb"><div class="nptb"><button class="npbt">Yeni</button><button class="npbt" onclick="this.closest('.win').querySelector('.npa').value=''">Temizle</button></div><textarea class="npa" placeholder="Buraya yaz..."></textarea></div>`;
  if(t==='sysmon')return`<div class="mb"><div><div class="mt">CPU</div><div class="bw"><div class="bf bor" id="cb" style="width:0%"></div></div><div class="mv" id="cv">0%</div></div><div><div class="mt">RAM</div><div class="bw"><div class="bf bbl" id="rb" style="width:0%"></div></div><div class="mv" id="rv">0%</div></div><div><div class="mt">AĞ</div><div class="bw"><div class="bf bgr" id="nb" style="width:0%"></div></div><div class="mv" id="nv">0 KB/s</div></div><div class="pl"><div class="mt">İşlemler</div>${[['retekz-wm','2.1%'],['bash','0.4%'],['python3','1.8%'],['network','0.9%']].map(([n,c])=>`<div class="pr2"><span>${n}</span><span>${c}</span></div>`).join('')}</div></div>`;
  if(t==='settings')return`<div class="sb"><div class="ss"><div class="sst">Görünüm</div>${[['Karanlık Tema',1],['Animasyonlar',1],['Özel İmleç',1],['Grid Zemin',1]].map(([l,o])=>`<div class="sr">${l}<div class="tog${o?' on':''}" onclick="this.classList.toggle('on')"></div></div>`).join('')}</div><div class="ss"><div class="sst">Sistem</div>${[['Bildirimler',1],['Oto. Güncelleme',0],['Güç Tasarrufu',0]].map(([l,o])=>`<div class="sr">${l}<div class="tog${o?' on':''}" onclick="this.classList.toggle('on')"></div></div>`).join('')}</div></div>`;
  if(t==='about')return`<div class="aw"><div class="al">ReTeKZ</div><div class="as">Masaüstü Ortamı</div><div class="ad"></div><div class="ai"><span>Sürüm:</span> 1.0.0<br><span>Geliştirici:</span> Adem<br><span>Mimari:</span> ARM64<br><span>Kernel:</span> RTK-1.0<br><span>Lisans:</span> Açık Kaynak</div><div class="ad"></div><div style="font-size:.62rem;color:#ff6b00;letter-spacing:2px">🔥 POWERED BY RETEKZ</div></div>`;
}

function ow(t){
  if(ws[t]){fw(t);return;}
  const d=D[t];
  const el=document.createElement('div');
  el.className='win';el.id='w_'+t;
  el.style.cssText=`width:${d.w}px;height:${d.h}px;left:${d.x+Math.random()*35}px;top:${d.y+Math.random()*25}px;z-index:${++zT};animation:wo .14s ease`;
  el.innerHTML=`<div class="wtb" onmousedown="sd(event,'${t}')"><button class="wb wc" onclick="cw('${t}')"></button><button class="wb wm" onclick="mw('${t}')"></button><button class="wb wx"></button><span class="wtit">${d.title}</span></div><div class="wbody">${bc(t)}</div>`;
  el.addEventListener('mousedown',()=>fw(t));
  document.getElementById('desk').appendChild(el);
  ws[t]={el,min:false,title:d.title};
  utb();
  if(t==='terminal')setTimeout(()=>document.getElementById('tin')?.focus(),70);
  if(t==='sysmon')sMon();
}

function cw(t){ws[t]?.el.remove();delete ws[t];utb();}
function mw(t){const w=ws[t];if(!w)return;w.min=!w.min;w.el.style.display=w.min?'none':'flex';utb();}
function fw(t){const w=ws[t];if(!w)return;if(w.min){w.min=false;w.el.style.display='flex';}w.el.style.zIndex=++zT;utb();}
function utb(){document.getElementById('tapps').innerHTML=Object.entries(ws).map(([t,w])=>`<div class="tap${w.min?'':' act'}" onclick="fw('${t}')">${w.title}</div>`).join('');}

// DRAG
let dr=null;
function sd(e,t){const w=ws[t];if(!w)return;const r=w.el.getBoundingClientRect();dr={t,ox:e.clientX-r.left,oy:e.clientY-r.top};fw(t);e.preventDefault();}
document.addEventListener('mousemove',e=>{if(!dr)return;const w=ws[dr.t];if(!w)return;w.el.style.left=Math.max(0,e.clientX-dr.ox)+'px';w.el.style.top=Math.max(0,Math.min(e.clientY-dr.oy,window.innerHeight-80))+'px';});
document.addEventListener('mouseup',()=>dr=null);

// TERMINAL
const TC={
  help:()=>'Komutlar: help, clear, whoami, date, uname, ls, echo, neofetch, retekz',
  whoami:()=>'root',
  date:()=>new Date().toLocaleString('tr-TR'),
  uname:()=>'ReTeKZ 1.0.0 ARM64',
  ls:()=>'belgeler  projeler  indirmeler  main.py  readme.txt',
  retekz:()=>'🔥 ReTeKZ OS — Güçlü, Hızlı, Özgür',
  neofetch:()=>`       /\\       root@retekz\n      /  \\      OS: ReTeKZ 1.0\n     / /\\ \\     Kernel: RTK-1.0\n    / /  \\ \\    Shell: retekz-sh\n   /_/    \\_\\   CPU: ARM64 / RAM: 4GB`,
};
function tk(e){
  if(e.key!=='Enter')return;
  const inp=document.getElementById('tin');
  const v=inp.value.trim();inp.value='';
  if(!v)return;
  const ls=document.getElementById('tls');
  const add=(txt,cls='')=>{const d=document.createElement('div');d.className='tl '+cls;d.textContent=txt;ls.appendChild(d);};
  add(`root@retekz:~$ ${v}`,'pr');
  const p=v.split(' '),cmd=p[0].toLowerCase(),args=p.slice(1).join(' ');
  if(cmd==='clear'){ls.innerHTML='';}
  else if(cmd==='echo'){add(args);}
  else if(TC[cmd]){TC[cmd]().split('\n').forEach(l=>add(l));}
  else{add(`retekz-sh: komut bulunamadı: ${cmd}`,'er');}
  const tw=document.getElementById('tw');if(tw)tw.scrollTop=tw.scrollHeight;
}

// SYSMON
let mi=null;
function sMon(){
  if(mi)return;
  mi=setInterval(()=>{
    if(!ws['sysmon']){clearInterval(mi);mi=null;return;}
    const c=15+Math.random()*40,r=28+Math.random()*22,n=Math.random()*70;
    const cb=document.getElementById('cb'),rb=document.getElementById('rb'),nb=document.getElementById('nb');
    if(cb){cb.style.width=c+'%';document.getElementById('cv').textContent=c.toFixed(1)+'%';}
    if(rb){rb.style.width=r+'%';document.getElementById('rv').textContent=r.toFixed(1)+'%';}
    if(nb){nb.style.width=n+'%';document.getElementById('nv').textContent=(n*10).toFixed(0)+' KB/s';}
  },1300);
}
</script>
</body>
</html>
